<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitHub Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h2>Discover GitHub Profiles</h2>
    <p class="subtitle">Search any GitHub username to view the bio, stats, and top repositories.</p>
    <p class="tagline">View a user's profile, bio, stats & top repos.</p>

    <div class="controls">
      <input type="text" id="username" placeholder="Enter username" />
      <button id="searchBtn">Search</button>
    </div>

    <div id="profile"></div>
  </div>

  <!-- ✅ Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- ✅ Your JS -->
  <script src="app.js"></script>
</body>
</html>
